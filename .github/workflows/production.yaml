name: Production CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  # Environment variables for tests
  JWT_SECRET: "test_secret"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/fittrack"

jobs:
  test-client:
    name: 🧪 Client Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client-web
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './client-web/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install

      - name: Run Linter
        run: pnpm run lint

      - name: Build Application
        run: pnpm run build

  test-server:
    name: 🧪 Server Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fitness-tracker-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './fitness-tracker-backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Application
        run: npm run build

  deploy-frontend:
    name: 🚀 Deploy Frontend (Vercel)
    needs: [test-client, test-server]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './client-web/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: ./client-web
        run: pnpm install

      - name: Build Application
        working-directory: ./client-web
        run: pnpm run build

      - name: Deploy to Vercel
        working-directory: ./client-web
        run: |
          pnpm install -g vercel
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

